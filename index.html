<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김근호 과장 디지털 명함</title>
    <style>
        :root {
            --uplus-pink: #E6007E;
            --dark-gray: #333333;
            --light-bg: #f8f9fa;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 360px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        /* 상단 핑크색 헤더 영역 */
        .card-header {
            background-color: var(--uplus-pink);
            height: 130px; /* 회사명을 위해 높이 확보 */
            display: flex;
            justify-content: center;
            align-items: center; /* 회사명 중앙 배치 */
            padding-bottom: 20px;
        }

        .header-company-name {
            color: white;
            font-size: 28px; /* 기존 22px에서 28px로 확대 */
            font-weight: 900; /* 가장 굵은 두께로 변경 */
            letter-spacing: 2px; /* 자간을 벌려 시원한 느낌 추가 (기본은 마이너스 값이었음) */
            text-shadow: 0 3px 6px rgba(0,0,0,0.2); /* 글씨가 커진 만큼 그림자도 살짝 강화 */
            word-break: keep-all; /* 줄바꿈 방지 */
        }

        .profile-container {
            position: relative;
            margin-top: -45px; /* 헤더에 걸치게 배치 */
            background: white;
            padding: 5px;
            border-radius: 50%;
            display: inline-block;
            z-index: 10;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background-color: #ffffff !important; 
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #eeeeee; 
        }

        .profile-img img {
            width: 75%; 
            height: 75%;
            object-fit: contain;
        }

        .content {
            padding: 10px 30px 40px;
            text-align: center;
        }

        h1 { margin: 10px 0 5px; font-size: 26px; color: var(--dark-gray); letter-spacing: -1px; }
        .position { margin-bottom: 25px; color: var(--uplus-pink); font-size: 16px; font-weight: 600; }
        
        .info-group { 
            text-align: left; 
            background: #fdf2f8; 
            padding: 20px; 
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .info-item { 
            margin: 12px 0; 
            font-size: 15px; 
            color: #444; 
            display: flex;
            align-items: center;
        }

        .info-item span { margin-right: 12px; font-size: 18px; width: 20px; text-align: center; }

        /* 주요업무 스타일 */
        .info-item.work-desc {
            align-items: flex-start;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f9dbe9;
            font-size: 14px;
            line-height: 1.4;
            color: #555;
        }

        .btn {
            background: var(--uplus-pink);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(230, 0, 126, 0.3);
            transition: all 0.2s ease;
        }

        .footer { 
            margin-top: 25px; 
            font-size: 13px; 
            color: #a0a0a0;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <div class="header-company-name">주식회사 유모스트</div>
    </div>
    <div class="content">
        <div class="profile-container">
            <div class="profile-img">
                <img src="uplus_logo_pink.png" alt="U+ Logo">
            </div>
        </div>
        
        <h1>김근호</h1>
        <div class="position">정책·정산팀 / 관리팀 과장</div>
        
        <div class="info-group">
            <div class="info-item"><span>📞</span> 010-3644-7890</div>
            <div class="info-item"><span>📧</span> most7890@naver.com</div>
            <div class="info-item work-desc">
                <span>📂</span> 
                <div><strong>주요업무 :</strong> 정책, 투자, 정산, 재고, 회계, 영업관리</div>
            </div>
        </div>

        <button class="btn" onclick="generateVCard()">연락처 휴대폰에 저장</button>
        
        <div class="footer">
             <strong>앞으로 잘 부탁드립니다! 😊</strong>
        </div>
    </div>
</div>

<script>
function generateVCard() {
    const info = {
        name: "김근호",
        title: "과장",
        org: "주식회사 유모스트",
        tel: "010-3644-7890",
        email: "most7890@naver.com"
    };

    const vcard = `BEGIN:VCARD
VERSION:3.0
FN:${info.name} ${info.title}
ORG:${info.org}
TEL;TYPE=CELL:${info.tel}
EMAIL:${info.email}
END:VCARD`;

    const blob = new Blob([vcard], { type: "text/vcard" });
    const url = window.URL.createObjectURL(blob);
    const newLink = document.createElement('a');
    newLink.href = url;
    newLink.setAttribute('download', `${info.name}_과장_명함.vcf`);
    newLink.click();
    window.URL.revokeObjectURL(url);
}
</script>

</body>
</html>
