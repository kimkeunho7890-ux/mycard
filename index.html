<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김근호 과장 디지털 명함</title>
    <style>
        :root {
            /* LGU+ 브랜드 컬러 및 세련된 다크그레이 */
            --uplus-pink: #E6007E;
            --dark-gray: #333333;
            --light-bg: #f8f9fa;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 360px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* 상단 컬러 바 */
        .card-header {
            background-color: var(--uplus-pink);
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 40px;
        }

        .profile-container {
            position: relative;
            margin-top: -50px; /* 헤더에 걸치게 배치 */
            background: white;
            padding: 5px;
            border-radius: 50%;
            display: inline-block;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            /* 배경을 확실한 흰색으로 설정 */
            background-color: #ffffff !important; 
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* 테두리를 살짝 주어 흰색 배경 카드와 구분되게 함 */
            border: 1px solid #eeeeee; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }

        .profile-img img {
            /* 이미지의 배경이 투명하든 흰색이든 자연스럽게 맞춤 */
            width: 75%; 
            height: 75%;
            object-fit: contain;
            background-color: #ffffff; /* 이미지 영역 자체 배경도 흰색 */
        }

        .content {
            padding: 20px 30px 40px;
            text-align: center;
        }

        h1 { margin: 10px 0 5px; font-size: 26px; color: var(--dark-gray); letter-spacing: -1px; }
        .position { margin-bottom: 25px; color: var(--uplus-pink); font-size: 16px; font-weight: 600; }
        
        .info-group { 
            text-align: left; 
            background: #fdf2f8; 
            padding: 20px; 
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .info-item { 
            margin: 12px 0; 
            font-size: 15px; 
            color: #555; 
            display: flex;
            align-items: center;
        }

        .info-item span { margin-right: 12px; font-size: 18px; }

        .btn {
            background: var(--uplus-pink);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(230, 0, 126, 0.3);
            transition: all 0.2s ease;
        }

        .btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 5px rgba(230, 0, 126, 0.2);
        }

        .footer { 
            margin-top: 25px; 
            font-size: 13px; 
            color: #a0a0a0; 
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header"></div>
    <div class="content">
        <div class="profile-container">
            <div class="profile-img">
                <img src="uplus_logo_pink.png" alt="U+ Logo">
            </div>
        </div>
        
        <h1>김근호</h1>
        <div class="position">정책·정산팀 / 관리팀 과장</div>
        
        <div class="info-group">
            <div class="info-item"><span>📞</span> 010-3644-7890</div>
            <div class="info-item"><span>📧</span> most7890@naver.com</div>
            <div class="info-item"><span>🏢</span> 주식회사 유모스트</div>
        </div>

        <button class="btn" onclick="generateVCard()">연락처 휴대폰에 저장</button>
        
        <div class="footer">
             <strong>앞으로 잘 부탁드립니다! 😊</strong>
        </div>
    </div>
</div>

<script>
function generateVCard() {
    const info = {
        name: "김근호",
        title: "과장",
        org: "주식회사 유모스트 (정책·정산팀 / 관리팀)",
        tel: "010-3644-7890",
        email: "most7890@naver.com"
    };

    const vcard = `BEGIN:VCARD
VERSION:3.0
FN:${info.name} ${info.title}
ORG:${info.org}
TEL;TYPE=CELL:${info.tel}
EMAIL:${info.email}
END:VCARD`;

    const blob = new Blob([vcard], { type: "text/vcard" });
    const url = window.URL.createObjectURL(blob);
    const newLink = document.createElement('a');
    newLink.href = url;
    newLink.setAttribute('download', `${info.name}_과장_명함.vcf`);
    newLink.click();
    window.URL.revokeObjectURL(url);
}
</script>

</body>
</html>
