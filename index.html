<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김근호 과장 디지털 명함</title>
    <style>
        :root {
            --uplus-pink: #E6007E;
            --dark-gray: #333333;
            --light-bg: #f8f9fa;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 360px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        /* [애니메이션] 상단 스르륵 나타나는 효과 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            background-color: var(--uplus-pink);
            height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 20px;
        }

        .header-company-name {
            color: white;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 3px 6px rgba(0,0,0,0.2);
            animation: fadeInUp 1s ease-out forwards; /* 애니메이션 적용 */
        }

        .profile-container {
            position: relative;
            margin-top: -45px;
            background: white;
            padding: 5px;
            border-radius: 50%;
            display: inline-block;
            z-index: 10;
            animation: fadeInUp 1.2s ease-out forwards;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background-color: #ffffff !important; 
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #eeeeee; 
        }

        .profile-img img {
            width: 75%; 
            height: 75%;
            object-fit: contain;
        }

        .content {
            padding: 10px 30px 40px;
            text-align: center;
        }

        h1 { margin: 10px 0 5px; font-size: 26px; color: var(--dark-gray); letter-spacing: -1px; 
             animation: fadeInUp 1.4s ease-out forwards; }
        
        .position { margin-bottom: 25px; color: var(--uplus-pink); font-size: 16px; font-weight: 600; 
                    animation: fadeInUp 1.6s ease-out forwards; }
        
        .info-group { 
            text-align: left; 
            background: #fdf2f8; 
            padding: 20px; 
            border-radius: 15px;
            margin-bottom: 25px;
            min-height: 160px; /* 타이핑 시 높이 변화 방지 */
        }

        .info-item { 
            margin: 12px 0; 
            font-size: 15px; 
            color: #444; 
            display: flex;
            align-items: center;
        }

        .info-item span { margin-right: 12px; font-size: 18px; width: 20px; text-align: center; }

        .info-item.work-desc {
            align-items: flex-start;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f9dbe9;
            font-size: 14px;
            line-height: 1.4;
            color: #555;
        }

        /* [애니메이션] 인사말 깜빡이는 효과 */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* [애니메이션] 이모티콘 점점점 나타나는 효과 */
        @keyframes dots {
            0% { opacity: 0; }
            33% { opacity: 1; }
            100% { opacity: 1; }
        }

        .footer { 
            margin-top: 25px; 
            font-size: 14px; 
            color: var(--dark-gray);
        }

        .blink-text { animation: blink 2s infinite; }
        
        .dot { opacity: 0; display: inline-block; animation: dots 2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.4s; }
        .dot:nth-child(3) { animation-delay: 0.8s; }

        .btn {
            background: var(--uplus-pink);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(230, 0, 126, 0.3);
            transition: all 0.2s ease;
            animation: fadeInUp 2s ease-out forwards;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <div class="header-company-name">주식회사 유모스트</div>
    </div>
    <div class="content">
        <div class="profile-container">
            <div class="profile-img">
                <img src="uplus_logo_pink.png" alt="U+ Logo">
            </div>
        </div>
        
        <h1>김근호</h1>
        <div class="position">정책·정산팀 / 관리팀 과장</div>
        
        <div class="info-group">
            <div class="info-item"><span>📞</span> <div id="type-phone"></div></div>
            <div class="info-item"><span>📧</span> <div id="type-email"></div></div>
            <div class="info-item work-desc">
                <span>📂</span> 
                <div><strong>주요업무 :</strong> <span id="type-work"></span></div>
            </div>
        </div>

        <button class="btn" onclick="generateVCard()">연락처 휴대폰에 저장</button>
        
        <div class="footer">
             <strong class="blink-text">앞으로 잘 부탁드립니다!</strong> 
             <span class="dot">😊</span><span class="dot">😊</span><span class="dot">😊</span>
        </div>
    </div>
</div>

<script>
// [애니메이션] 타이핑 효과 스크립트
const typingData = [
    { id: 'type-phone', text: '010-3644-7890' },
    { id: 'type-email', text: 'most7890@naver.com' },
    { id: 'type-work', text: '정책, 투자, 정산, 재고, 회계, 영업관리' }
];

function typeAll(index = 0) {
    if (index >= typingData.length) return;
    
    const item = typingData[index];
    const element = document.getElementById(item.id);
    let charIndex = 0;

    function startTyping() {
        if (charIndex < item.text.length) {
            element.innerHTML += item.text.charAt(charIndex);
            charIndex++;
            setTimeout(startTyping, 50); // 타이핑 속도
        } else {
            setTimeout(() => typeAll(index + 1), 200); // 다음 줄 시작 지연
        }
    }
    startTyping();
}

// 페이지 로드 후 1.5초 뒤(상단 애니메이션 후) 타이핑 시작
window.onload = () => setTimeout(typeAll, 1500);

function generateVCard() {
    const info = {
        name: "김근호",
        title: "과장",
        org: "주식회사 유모스트",
        tel: "010-3644-7890",
        email: "most7890@naver.com",
        work_desc: "정책, 투자, 정산, 재고, 회계, 영업관리"
    };

    const vcard = [
        "BEGIN:VCARD",
        "VERSION:3.0",
        `N:김;근호;;;`,
        `FN:${info.name}`,
        `TITLE:${info.title}`,
        `ORG:${info.org}`,
        `TEL;TYPE=CELL,VOICE:${info.tel}`,
        `EMAIL;TYPE=PREF,INTERNET:${info.email}`,
        `NOTE:주요업무 : ${info.work_desc}`,
        "END:VCARD"
    ].join("\n");

    const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
    const url = window.URL.createObjectURL(blob);
    const newLink = document.createElement('a');
    newLink.href = url;
    newLink.setAttribute('download', `${info.name}_명함.vcf`);
    newLink.click();
    window.URL.revokeObjectURL(url);
}
</script>

</body>
</html>
